services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: khusi_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-khusi}
      POSTGRES_USER: ${POSTGRES_USER:-khusi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-khusi_password}
    ports:
      - "5432:5432"
    volumes:
      - khusi_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-khusi} -d ${POSTGRES_DB:-khusi}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Redis for Celery & Caching
  redis:
    image: redis:7.4-alpine
    container_name: khusi_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - khusi_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Celery Worker (runs background tasks)
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    image: khusi-celery:latest
    container_name: khusi_celery_worker
    command: celery -A ecommerce worker --loglevel=info
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-khusi}:${POSTGRES_PASSWORD:-khusi_password}@localhost:5432/${POSTGRES_DB:-khusi}
      REDIS_URL: redis://localhost:6379/1
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - khusi_media:/app/media
    restart: unless-stopped

volumes:
  khusi_postgres:
  khusi_redis:
  khusi_media:

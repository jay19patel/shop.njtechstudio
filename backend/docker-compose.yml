services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: store_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-njshop}
      POSTGRES_USER: ${POSTGRES_USER:-njshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-njshop_password}
    ports:
      - "5432:5432"
    volumes:
      - store_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-njshop} -d ${POSTGRES_DB:-njshop}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Redis for Celery & Caching
  redis:
    image: redis:7.4-alpine
    container_name: store_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - store_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  store_postgres:
  store_redis:

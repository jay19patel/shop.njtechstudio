<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Soul Craft Studio{% endblock %}</title>
  <style>
    body { margin: 0; padding: 0; background: #f5f3ef; color: #302d2a; font-family: Arial, Helvetica, sans-serif; }
    table { border-spacing: 0; }
    .shell { width: 100%; background: #f5f3ef; padding: 26px 10px; }
    .card { width: 100%; max-width: 620px; margin: 0 auto; background: #ffffff; border: 1px solid #e7e2d9; }
    .brand { padding: 26px 34px 20px; text-align: center; border-bottom: 1px solid #eee9e1; color: #c65d30; font-family: Georgia, serif; font-size: 31px; font-weight: bold; }
    .tagline { display: block; margin-top: 7px; color: #827b73; font-family: Arial, Helvetica, sans-serif; font-size: 10px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase; }
    .content { padding: 34px 38px 38px; }
    h1 { margin: 0 0 10px; text-align: center; font-size: 25px; line-height: 1.25; color: #302d2a; }
    .lead { margin: 0 auto 26px; max-width: 475px; text-align: center; font-size: 14px; line-height: 1.65; color: #625d57; }
    .button-wrap { text-align: center; margin: 25px 0 31px; }
    .button { display: inline-block; padding: 13px 28px; background: #302d2a; border-radius: 28px; color: #ffffff !important; text-decoration: none; font-size: 13px; font-weight: bold; }
    .title { margin: 0 0 12px; font-size: 17px; font-weight: bold; color: #302d2a; }
    .panel { margin: 0 0 24px; border: 1px solid #e7e2d9; border-radius: 5px; overflow: hidden; }
    .row { width: 100%; border-bottom: 1px solid #eee9e1; }
    .row:last-child { border-bottom: 0; }
    .label { padding: 11px 14px; width: 44%; color: #716b64; font-size: 13px; }
    .value { padding: 11px 14px; text-align: right; color: #302d2a; font-size: 13px; font-weight: bold; }
    .badge { display: inline-block; padding: 5px 11px; background: #f5f3ef; border-radius: 14px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: .4px; }
    .items { width: 100%; border: 1px solid #e7e2d9; margin: 0 0 20px; }
    .items th { background: #faf9f6; padding: 10px 12px; color: #716b64; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
    .items td { padding: 13px 12px; border-top: 1px solid #eee9e1; color: #302d2a; font-size: 13px; vertical-align: top; }
    .muted { color: #716b64; font-size: 12px; line-height: 1.5; }
    .right { text-align: right; }
    .center { text-align: center; }
    .total { width: 100%; margin: 0 0 28px; background: #faf9f6; border: 1px solid #e7e2d9; }
    .total td { padding: 15px 14px; font-size: 15px; font-weight: bold; }
    .notice { margin: 0 0 26px; padding: 14px 16px; background: #faf9f6; border: 1px solid #e7e2d9; color: #625d57; font-size: 13px; line-height: 1.6; }
    .footer { padding: 22px 30px; background: #faf9f6; border-top: 1px solid #eee9e1; text-align: center; font-size: 11px; line-height: 1.8; color: #827b73; }
    .footer a { color: #625d57; }
    @media only screen and (max-width: 480px) { .content { padding: 28px 20px; } .brand { padding: 22px; } }
  </style>
</head>
<body>
  <table role="presentation" class="shell"><tr><td>
    <table role="presentation" class="card" align="center">
      <tr><td class="brand">Soul Craft Studio<span class="tagline">Handcrafted with love</span></td></tr>
      <tr><td class="content">{% block content %}{% endblock %}</td></tr>
      <tr><td class="footer">
        {% block footer %}This is an automated message from Soul Craft Studio.<br>{% endblock %}
        &copy; {% now "Y" %} Soul Craft Studio &nbsp;|&nbsp; <a href="{{ frontend_url }}">Visit Store</a>
      </td></tr>
    </table>
  </td></tr></table>
</body>
</html>
